name: Release runner

# Builds the runner's sdist+wheel, attaches a keyless, GitHub-OIDC-signed
# Sigstore build-provenance attestation to a GitHub Release, and publishes
# to PyPI via Trusted Publishing (OIDC — no stored API token) — the "signed
# release... via sigstore/cosign on the git tag" distribution model described
# in docs/02-architecture.md §2.1.
#
# The PyPI publish job needs a one-time, account-owner-only setup before it
# can run (this workflow can't do it — it's PyPI-side, not repo-side):
#   1. https://pypi.org/manage/account/publishing/ -> add a pending publisher
#      for project "goesb-runner", owner "taktx-io", repo "GOESB",
#      workflow "release.yml", environment "pypi".
#   2. In this repo's Settings -> Environments, create an environment named
#      "pypi" (optionally with required reviewers, the same gate pattern
#      used for oesb-platform's production deploys).
# Until that's done, publish-pypi will fail at the OIDC exchange step —
# build-and-attest (the GitHub Release) is unaffected either way.

on:
  push:
    tags: [ "runner-v*" ]

permissions:
  contents: write    # create the GitHub Release
  id-token: write    # OIDC token for keyless Sigstore signing
  attestations: write

jobs:
  build-and-attest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }

      - run: pip install build
      - run: cd runner && python -m build --outdir ../dist .

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: "dist/*"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/*
          generate_release_notes: true

  publish-pypi:
    needs: build-and-attest
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # Trusted Publishing OIDC exchange — no API token stored anywhere
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
