# Local development/test Postgres for the API (M3, docs/03-roadmap.md).
# Not a production deployment topology — see docs/02-architecture.md §8 for
# that (managed Postgres + CDN-fronted API, not modeled here).
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: oesb
      POSTGRES_PASSWORD: oesb
      POSTGRES_DB: oesb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oesb"]
      interval: 2s
      timeout: 3s
      retries: 20
