# Example official profile — English batch. Identical structure to the Dutch
# profile; only language and normalization ruleset differ. Validated against
# schemas/benchmark-profile.schema.json.
id: whisper-medium-en-batch
version: 1.0.0
title: Whisper Medium English (Batch)
benchmark_type: batch
language: en-US
runtime:
  name: faster-whisper
  min_version: "1.0.0"
model:
  name: whisper-medium
  quantization: int8
  beam_size: 5
  temperature: 0.0
  vad: true
configuration:
  threads: 4
normalization:
  lowercase: true
  remove_punctuation: true
  expand_numbers: true
  ruleset_id: oesb-en-v1
scoring:
  primary_metric: wer
  tie_breakers: [real_time_factor, energy_wh]
metrics: [wer, cer, real_time_factor, cpu_pct, ram_mb, energy_wh]
changelog:
  - version: 1.0.0
    notes: Initial profile.
