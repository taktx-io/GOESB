# Example official profile — English batch on vosk, proving the runtime
# adapter interface (M2 exit criterion: adapters swap without core changes).
# Validated against schemas/benchmark-profile.schema.json.
id: vosk-small-en-batch
version: 1.0.0
title: Vosk Small English (Batch)
benchmark_type: batch
language: en-US
runtime:
  name: vosk
  min_version: "0.3.44"
model:
  name: vosk-model-small-en-us-0.15
configuration:
  threads: 4
normalization:
  lowercase: true
  remove_punctuation: true
  expand_numbers: true
  ruleset_id: goesb-en-v1
scoring:
  primary_metric: wer
  tie_breakers: [real_time_factor, energy_wh]
metrics: [wer, cer, real_time_factor, cpu_pct, ram_mb, energy_wh, temperature_c]
changelog:
  - version: 1.0.0
    notes: Initial profile (M2) — second runtime adapter proving the plugin interface.
